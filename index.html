<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#06060b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dominó">
  <meta name="description" content="Apuntes de dominó — PWA offline">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dominó Tracker">
  <meta property="og:description" content="Apuntes de dominó offline — guarda partidas en tu teléfono">
  <meta property="og:locale" content="es">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>Dominó Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060b;
      --bg-elevated: #0c0c14;
      --surface: rgba(20, 20, 30, 0.72);
      --surface-solid: #14141e;
      --surface-hover: rgba(30, 30, 44, 0.9);
      --border: rgba(255, 255, 255, 0.07);
      --border-strong: rgba(255, 255, 255, 0.12);
      --accent: #8B5CF6;
      --accent-bright: #A78BFA;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --accent-soft: rgba(139, 92, 246, 0.12);
      --cyan: #22D3EE;
      --success: #34D399;
      --warning: #FBBF24;
      --danger: #F87171;
      --text: #F1F5F9;
      --text-muted: #8B9CB3;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --topbar-height: 56px;
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
      --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.35);
      --shadow-glow: 0 0 24px var(--accent-glow);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(ellipse 90% 60% at 50% -30%, rgba(139, 92, 246, 0.14), transparent 55%),
        radial-gradient(ellipse 50% 40% at 100% 20%, rgba(34, 211, 238, 0.06), transparent),
        radial-gradient(ellipse 40% 30% at 0% 80%, rgba(139, 92, 246, 0.05), transparent),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .app-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      height: var(--topbar-height);
      padding: 0 12px 0 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(6, 6, 11, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 110;
    }

    .topbar-start {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .topbar-game-title {
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      min-width: 0;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .topbar-game-title[hidden] {
      display: none;
    }

    .nav-sheet-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 16px 0 20px;
      text-align: left;
    }

    .nav-sheet-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: inherit;
      font-size: 1.0625rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
    }

    .nav-sheet-btn .nav-icon {
      font-size: 1.5rem;
      line-height: 1;
      width: 1.75rem;
      text-align: center;
    }

    .nav-sheet-btn.active {
      color: var(--accent-bright);
      background: var(--accent-soft);
      border-color: rgba(139, 92, 246, 0.35);
    }

    .nav-sheet-btn:active { transform: scale(0.98); }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      min-width: 0;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), #6366F1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.35);
      flex-shrink: 0;
    }

    .brand-text {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text), var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .view {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      padding-bottom: 16px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .view.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-meta {
      font-size: 0.8125rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), background var(--transition);
      flex-shrink: 0;
    }

    .btn-icon:active { transform: scale(0.96); }

    /* Cards */
    .card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }

    .card-title {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* Player cards grid */
    .players-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
      align-items: start;
    }

    .players-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .players-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .players-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    .score-column {
      position: relative;
      overflow: hidden;
      background: var(--surface);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 10px;
      min-height: 120px;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
    }

    /* Efectos: sumar, quitar, ganar */
    .score-column.fx-add {
      animation: fxColGlowAdd 0.55s ease;
    }

    .score-column.fx-remove {
      animation: fxColShake 0.45s ease;
    }

    .score-column.fx-win {
      animation: fxColWin 1.2s ease 2;
      z-index: 2;
    }

    .score-col-total.fx-pop {
      animation: fxScorePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .score-col-total.fx-shrink {
      animation: fxScoreShrink 0.45s ease;
    }

    .score-col-total.fx-win-pulse {
      animation: fxWinTotal 0.8s ease 3;
    }

    .score-line.fx-new {
      animation: fxLineIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .progress-fill.fx-grow {
      animation: fxBarGrow 0.5s ease;
    }

    .fx-float {
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translateX(-50%);
      font-size: 1.75rem;
      font-weight: 800;
      pointer-events: none;
      z-index: 5;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    .fx-float-up {
      color: var(--cyan);
      animation: fxFloatUp 0.7s ease forwards;
    }

    .fx-float-down {
      color: var(--danger);
      animation: fxFloatDown 0.65s ease forwards;
    }

    #fx-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 199;
      opacity: 0;
    }

    #fx-flash.fx-win-flash {
      animation: fxWinFlash 0.9s ease forwards;
    }

    .modal-emoji.fx-modal-celebrate {
      animation: fxModalEmoji 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn.fx-dock-pulse {
      animation: fxDockPulse 0.4s ease;
    }

    @keyframes fxColGlowAdd {
      0%, 100% { box-shadow: var(--shadow-sm); border-color: var(--border); }
      45% { box-shadow: 0 0 32px rgba(6, 182, 212, 0.45); border-color: var(--cyan); }
    }

    @keyframes fxColShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    @keyframes fxColWin {
      0%, 100% { box-shadow: 0 0 24px rgba(139, 92, 246, 0.35); transform: scale(1); }
      50% { box-shadow: 0 0 48px rgba(251, 191, 36, 0.55); transform: scale(1.03); border-color: rgba(251, 191, 36, 0.6); }
    }

    @keyframes fxScorePop {
      0% { transform: scale(1); filter: brightness(1); }
      45% { transform: scale(1.18); filter: brightness(1.3); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    @keyframes fxScoreShrink {
      0% { transform: scale(1); }
      50% { transform: scale(0.88); filter: brightness(0.85); }
      100% { transform: scale(1); }
    }

    @keyframes fxWinTotal {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); filter: brightness(1.25); }
    }

    @keyframes fxLineIn {
      from { opacity: 0; transform: translateY(-14px) scale(0.8); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fxBarGrow {
      from { filter: brightness(1.4); }
      to { filter: brightness(1); }
    }

    @keyframes fxFloatUp {
      0% { opacity: 1; transform: translate(-50%, 0) scale(0.85); }
      100% { opacity: 0; transform: translate(-50%, -48px) scale(1.15); }
    }

    @keyframes fxFloatDown {
      0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
      100% { opacity: 0; transform: translate(-50%, 36px) scale(0.75); }
    }

    @keyframes fxWinFlash {
      0% { opacity: 0; background: radial-gradient(circle at 50% 40%, rgba(139, 92, 246, 0.5), transparent 65%); }
      35% { opacity: 1; }
      100% { opacity: 0; background: radial-gradient(circle at 50% 40%, rgba(251, 191, 36, 0.25), transparent 70%); }
    }

    @keyframes fxModalEmoji {
      0% { transform: scale(0.3) rotate(-12deg); opacity: 0; }
      60% { transform: scale(1.15) rotate(6deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes fxDockPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); box-shadow: 0 0 20px rgba(124, 58, 237, 0.5); }
    }

    .score-column.selected {
      border-color: var(--accent);
      box-shadow: var(--shadow-glow);
      transform: translateY(-1px);
    }

    .score-column.leading:not(.selected) {
      border-color: rgba(139, 92, 246, 0.35);
    }

    .score-col-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      margin-bottom: 6px;
    }

    .score-col-emoji {
      font-size: 2.375rem;
      line-height: 1;
      display: block;
    }

    .players-grid.cols-3 .score-col-emoji { font-size: 2.125rem; }
    .players-grid.cols-4 .score-col-emoji { font-size: 1.875rem; }

    .player-emoji {
      font-size: 1.75rem;
      line-height: 1;
      vertical-align: middle;
    }

    .score-col-name {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .players-grid.cols-4 .score-col-name { font-size: 0.625rem; }

    .score-col-total {
      font-size: 44px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      font-variant-numeric: tabular-nums;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
      background: linear-gradient(180deg, var(--text) 30%, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .players-grid.cols-3 .score-col-total { font-size: 36px; }
    .players-grid.cols-4 .score-col-total { font-size: 28px; }

    .score-column .progress-bar { margin-bottom: 10px; }

    .score-lines {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 24px;
    }

    .score-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cyan);
      padding: 8px 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-variant-numeric: tabular-nums;
    }

    .players-grid.cols-3 .score-line { font-size: 1.3125rem; }
    .players-grid.cols-4 .score-line { font-size: 1.125rem; }

    .score-line-value {
      flex: 1;
      text-align: center;
    }

    .score-line-delete {
      width: 30px;
      height: 30px;
      border: none;
      background: rgba(239, 68, 68, 0.12);
      color: var(--danger);
      border-radius: 8px;
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: transform var(--transition), background var(--transition);
    }

    .score-line-delete:active {
      transform: scale(0.96);
      background: rgba(239, 68, 68, 0.28);
    }

    .score-line:last-child { border-bottom: none; }

    .input-dock {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(8px + var(--safe-bottom));
      width: calc(100% - 24px);
      max-width: 496px;
      background: rgba(14, 14, 22, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 15px 17px;
      z-index: 90;
      box-shadow: var(--shadow-md);
    }

    .dock-quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-bottom: 11px;
      justify-content: center;
    }

    .dock-quick-btn {
      min-width: 53px;
      padding: 11px 15px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
      font-variant-numeric: tabular-nums;
    }

    .dock-quick-btn:active {
      transform: scale(0.96);
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .dock-selected {
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .dock-selected strong {
      color: var(--accent-bright);
      text-transform: none;
      letter-spacing: normal;
      font-size: 0.9375rem;
    }

    #view-game.has-input-dock {
      padding-bottom: calc(169px + var(--safe-bottom));
    }

    .dock-manual-row {
      display: flex;
      gap: 9px;
    }

    .dock-manual-row input {
      flex: 1;
      min-width: 0;
      padding: 13px 15px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: inherit;
      font-size: 1.0625rem;
      font-weight: 500;
      outline: none;
      font-variant-numeric: tabular-nums;
    }

    .dock-manual-row input:focus { border-color: var(--accent); }

    .dock-manual-row .btn-sum {
      flex-shrink: 0;
      padding: 13px 19px;
      font-size: 1rem;
      border-radius: var(--radius-xs);
    }

    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 0;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.96); }
    .btn:hover { background: var(--surface-hover); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6366F1);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.35);
    }

    .btn-primary:hover { background: linear-gradient(135deg, #7C3AED, #4F46E5); }

    .btn-danger {
      background: transparent;
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-success {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 0.8125rem;
    }

    .btn-block { width: 100%; }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-group .btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Setup form */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
    }

    .form-input:focus { border-color: var(--accent); }

    .player-setup {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .player-setup input { flex: 1; min-width: 0; }

    .emoji-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .emoji-btn {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--bg);
      font-size: 1.625rem;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-btn.selected {
      border-color: var(--accent);
      background: rgba(124, 58, 237, 0.2);
    }

    .emoji-btn:active { transform: scale(0.96); }

    .emoji-toggle {
      width: 52px;

    /* History table */

    .collapse-header {

    .history-table {

    .history-table th,

    /* Completed games list */

      background: rgba(20, 20, 32, 0.95);
