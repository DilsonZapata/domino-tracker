</head>
<body>
  <div id="env-banner" class="env-banner" role="alert"></div>
  <div id="app">
    <header class="app-topbar">
      <div class="topbar-start">
        <button type="button" class="btn-icon" id="nav-menu-btn" aria-label="Menú">⋮</button>
        <h1 class="topbar-game-title" id="topbar-game-title" hidden></h1>
      </div>
      <div class="topbar-brand">
        <span class="brand-icon">🁫</span>
        <span class="brand-text">Dominó</span>
      </div>
    </header>
    <div class="app-content">
      <div id="view-game" class="view active"></div>
      <div id="view-history" class="view"></div>
      <div id="view-config" class="view"></div>
    </div>
    <div id="global-toast" class="global-toast" aria-live="polite"></div>
  </div>

  <div id="fx-flash" aria-hidden="true"></div>

  <div id="nav-dialog" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="nav-dialog-title">
    <div class="modal nav-sheet-modal">
      <div class="modal-title" id="nav-dialog-title">Ir a</div>
      <div class="nav-sheet-actions" id="nav-sheet-actions">
        <button type="button" class="nav-sheet-btn" data-tab="game">
          <span class="nav-icon">🎲</span>
          <span>Juego</span>
        </button>
        <button type="button" class="nav-sheet-btn" data-tab="history">
          <span class="nav-icon">📋</span>
          <span>Historial</span>
        </button>
        <button type="button" class="nav-sheet-btn" data-tab="config">
          <span class="nav-icon">⚙️</span>
          <span>Configuración</span>
        </button>
      </div>
      <button type="button" class="btn btn-block" id="nav-dialog-close">Cerrar</button>
    </div>
  </div>

  <div id="confirm-dialog" class="modal-overlay" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal confirm-modal">
      <div class="confirm-icon" id="confirm-icon" aria-hidden="true"></div>
      <div class="modal-title" id="confirm-title"></div>
      <div class="modal-sub" id="confirm-message"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-primary btn-block" id="confirm-ok">Confirmar</button>
        <button type="button" class="btn btn-block" id="confirm-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="victory-modal" class="modal-overlay">
    <div class="modal">
      <div class="confetti-container" id="confetti-container"></div>
      <div class="modal-emoji" id="modal-emoji"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-sub" id="modal-sub"></div>
      <div class="modal-actions">
        <button class="btn btn-primary btn-block" id="btn-revancha">Revancha</button>
        <button class="btn btn-block" id="btn-nueva-partida">Nueva partida</button>
      </div>
    </div>
  </div>

  <script>
    /* Persistencia: configuración, partida activa, apuntes e historial en localStorage */
    const STORAGE_KEY = 'domino-tracker-v1';
    const EMOJIS = ['🦁', '🐯', '🦊', '🐺', '🦅', '🦋', '🐉', '🦄', '🔥', '⚡', '🌊', '🏆', '👑', '💎', '🎯', '🚀', '🎲', '🃏', '🎮', '🎸'];
    const DEFAULT_QUICK = [5, 10, 15, 20, 25];
    const MAX_QUICK = 5;
    const DEFAULT_TARGET = 100;
    const TARGET_PRESETS = [50, 100, 150, 200, 300];

    let state = loadState();
    let currentTab = 'game';
    let selectedPlayerId = null;
    let setupDraft = null;
    let configDraft = null;
    let navDialogOpen = false;
    let pendingFx = null;

    const Sound = {
      ctx: null,
      master: null,
      unlocked: false,
      _readyPromise: null,

      initContext() {
        if (this.ctx) return;
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        this.ctx = new Ctx();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.92;
        this.master.connect(this.ctx.destination);
      },

      playSilentUnlock() {
        if (!this.ctx) return;
        try {
          const buffer = this.ctx.createBuffer(1, 1, this.ctx.sampleRate);
          const source = this.ctx.createBufferSource();
          source.buffer = buffer;
          source.connect(this.ctx.destination);
          source.start(0);
        } catch (_) { /* ignore */ }
      },

      ready() {
        this.initContext();
        if (!this.ctx) return Promise.resolve(false);
        this.playSilentUnlock();
        if (this.ctx.state === 'running') {
          this.unlocked = true;
          return Promise.resolve(true);
        }
        if (!this._readyPromise) {
          this._readyPromise = this.ctx.resume()
            .then(() => {
              this.unlocked = true;
              this.playSilentUnlock();
              return true;
            })
            .catch(() => false)
            .finally(() => { this._readyPromise = null; });
        }
        return this._readyPromise;
      },

      unlock() {
        this.ready();
      },

      out() {
        return this.master || this.ctx?.destination;
      },

      play(fn) {
        if (this.ctx?.state === 'running') {
          fn();
          return;
        }
        this.ready().then(ok => {
          if (ok && this.ctx?.state === 'running') fn();
        });
      },

      tone(freq, delay, duration, type, volume) {
        if (!this.ctx || !this.out()) return;
        const t = this.ctx.currentTime + delay;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type || 'triangle';
        osc.frequency.setValueAtTime(freq, t);
        const peak = volume || 0.35;
        gain.gain.setValueAtTime(0.001, t);
        gain.gain.exponentialRampToValueAtTime(peak, t + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain);
        gain.connect(this.out());
        osc.start(t);
        osc.stop(t + duration + 0.05);
      },

      sweep(startFreq, endFreq, delay, duration, volume) {
        if (!this.ctx || !this.out()) return;
        const t = this.ctx.currentTime + delay;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(startFreq, t);
        osc.frequency.exponentialRampToValueAtTime(Math.max(endFreq, 1), t + duration);
        const peak = volume || 0.32;
        gain.gain.setValueAtTime(0.001, t);
        gain.gain.exponentialRampToValueAtTime(peak, t + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain);
        gain.connect(this.out());
        osc.start(t);
        osc.stop(t + duration + 0.05);
      },

      _selectTeam() {
        this.tone(880, 0, 0.07, 'triangle', 0.28);
        this.tone(1100, 0.03, 0.06, 'triangle', 0.2);
      },

      selectTeam() {
        this.play(() => this._selectTeam());
      },

      _addPoints() {
        this.tone(520, 0, 0.09, 'triangle', 0.42);
        this.tone(780, 0.04, 0.11, 'triangle', 0.34);
      },

      addPoints() {
        this.play(() => this._addPoints());
      },

      _removePoints() {
        this.sweep(420, 180, 0, 0.16, 0.38);
      },

      removePoints() {
        this.play(() => this._removePoints());
      },

      clapBurst(startTime) {
        if (!this.ctx || !this.out()) return;
        const duration = 0.07 + Math.random() * 0.05;
        const bufferSize = Math.floor(this.ctx.sampleRate * duration);
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.12));
        }
        const source = this.ctx.createBufferSource();
        source.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 700 + Math.random() * 1400;
        filter.Q.value = 0.6 + Math.random() * 0.8;
        const gain = this.ctx.createGain();
        const vol = 0.45 + Math.random() * 0.25;
        gain.gain.setValueAtTime(vol, startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(this.out());
        source.start(startTime);
      },

      _victory() {
        if (!this.ctx) return;
        const t0 = this.ctx.currentTime;
        for (let i = 0; i < 18; i++) {
          this.clapBurst(t0 + Math.random() * 2.2);
        }
        for (let i = 0; i < 8; i++) {
          this.clapBurst(t0 + 0.4 + i * 0.18 + Math.random() * 0.08);
        }
      },

      victory() {
        this.play(() => this._victory());
      }
    };

    function bindSoundUnlock() {
      const unlock = () => Sound.unlock();
      document.addEventListener('pointerdown', unlock, { capture: true, passive: true });
      document.addEventListener('touchend', unlock, { capture: true, passive: true });
      document.addEventListener('click', unlock, { capture: true });
    }

    function initConfigDraft() {
      const s = state.settings;
      configDraft = {
        playerCount: s.playerCount,
        defaultTarget: s.defaultTarget,
        quickValues: [...s.quickValues],
        players: s.players.map(p => ({ name: p.name, emoji: p.emoji }))
      };
    }

    function showToast(message) {
      const toast = document.getElementById('global-toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function syncConfigDraftFromForm() {
      if (!configDraft) initConfigDraft();
      document.querySelectorAll('#view-config [data-action="cfg-name"]').forEach(input => {
        const i = parseInt(input.dataset.index, 10);
        if (configDraft.players[i]) configDraft.players[i].name = input.value.trim() || `Jugador ${i + 1}`;
      });
      const target = document.getElementById('cfg-target');
      if (target) configDraft.defaultTarget = parseInt(target.value, 10) || DEFAULT_TARGET;
    }

    function saveConfigDraft() {
      syncConfigDraftFromForm();

      if (!configDraft.quickValues.length) {
        alert('Agrega al menos un apunte rápido.');
        return;
      }

      try {
        state.settings = normalizeSettings({
          playerCount: configDraft.playerCount,
          defaultTarget: configDraft.defaultTarget,
          quickValues: [...configDraft.quickValues],
          players: configDraft.players.map(p => ({ ...p }))
        });
        saveState();
        initConfigDraft();
        showToast('✓ Configuración guardada');
        renderConfigView();
      } catch (err) {
        alert('No se pudo guardar. Verifica que el navegador permita almacenamiento local.');
      }
    }

    function getPlayerLines(game, playerId) {
      return game.history
        .filter(h => h.playerId === playerId)
        .sort((a, b) => a.round - b.round)
        .map(h => {
          if (!h.id) h.id = uid();
          return h;
        });
    }

    function findHistoryEntry(game, entryId) {
      return game.history.find(h => {
        if (!h.id) h.id = uid();
        return h.id === entryId;
      });
    }

    function unfinishGameIfNeeded(game) {
      if (!game.finished) return;

      const stillWinner = game.players.some(p => p.score >= game.target);
      if (stillWinner) return;

      game.finished = false;
      delete game.winnerId;
      delete game.finishedAt;

      const completedIdx = state.completedGames.findIndex(g => g.id === game.id);
      if (completedIdx !== -1) {
        const completed = state.completedGames.splice(completedIdx, 1)[0];
        const winnerName = completed.winner.name;
        if (state.playerStats[winnerName]) {
          state.playerStats[winnerName].wins--;
          if (state.playerStats[winnerName].wins <= 0) delete state.playerStats[winnerName];
        }
      }

      hideVictoryModal();
    }

    function defaultPlayers(count) {
      return Array.from({ length: count }, (_, i) => ({
        name: `Jugador ${i + 1}`,
        emoji: EMOJIS[i % EMOJIS.length]
      }));
    }

    function defaultSettings() {
      return {
        playerCount: 2,
        players: defaultPlayers(2),
        defaultTarget: DEFAULT_TARGET,
        quickValues: [...DEFAULT_QUICK]
      };
    }

    function defaultState() {
      return {
        settings: defaultSettings(),
        activeGame: null,
        completedGames: [],
        playerStats: {}
      };
    }

    function normalizeSettings(raw) {
      const base = defaultSettings();
      const s = { ...base, ...raw };
      const count = [2, 3, 4].includes(s.playerCount) ? s.playerCount : 2;
      let players = Array.isArray(s.players) && s.players.length
        ? s.players.map((p, i) => ({
            name: p.name || `Jugador ${i + 1}`,
            emoji: p.emoji || EMOJIS[i % EMOJIS.length]
          }))
        : defaultPlayers(count);

      players = players.slice(0, count);
      while (players.length < count) {
        const i = players.length;
        players.push({ name: `Jugador ${i + 1}`, emoji: EMOJIS[i % EMOJIS.length] });
      }

      const quickValues = (Array.isArray(s.quickValues) && s.quickValues.length
        ? [...s.quickValues].sort((a, b) => a - b)
        : [...DEFAULT_QUICK]
      ).slice(0, MAX_QUICK);

      return {
        playerCount: count,
        players,
        defaultTarget: s.defaultTarget > 0 ? s.defaultTarget : DEFAULT_TARGET,
        quickValues
      };
    }

    function normalizeLoadedState(parsed) {
      const base = defaultState();
      const completedGames = Array.isArray(parsed.completedGames) ? parsed.completedGames : [];
      completedGames.forEach(g => {
        if (!g.id) g.id = uid();
      });
      const playerStats = parsed.playerStats && typeof parsed.playerStats === 'object'
        ? parsed.playerStats
        : {};
      return {
        settings: normalizeSettings(parsed.settings || {}),
        activeGame: parsed.activeGame ?? null,
        completedGames,
        playerStats
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          return normalizeLoadedState(JSON.parse(raw));
        }
      } catch (e) {
        console.warn('Error al cargar datos guardados', e);
      }
      return defaultState();
    }

    function saveState() {
      const snapshot = {
        settings: normalizeSettings(state.settings),
        activeGame: state.activeGame,
        completedGames: Array.isArray(state.completedGames) ? state.completedGames : [],
        playerStats: state.playerStats && typeof state.playerStats === 'object' ? state.playerStats : {}
      };
      state.settings = snapshot.settings;
      state.completedGames = snapshot.completedGames;
      state.playerStats = snapshot.playerStats;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
        return true;
      } catch (err) {
        console.warn('localStorage no disponible', err);
        showToast('No se pudo guardar en este dispositivo');
        return false;
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawDominoDot(ctx, cx, cy, radius) {
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function createDominoIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#13131A';
      roundRect(ctx, 0, 0, size, size, size * 0.22);
      ctx.fill();

      const pad = size * 0.16;
      const tileW = size - pad * 2;
      const tileH = size - pad * 2;
      const tileX = pad;
      const tileY = pad;

      ctx.fillStyle = '#F8FAFC';
      roundRect(ctx, tileX, tileY, tileW, tileH, size * 0.07);
      ctx.fill();

      ctx.strokeStyle = '#0A0A0F';
      ctx.lineWidth = Math.max(2, size * 0.02);
      ctx.beginPath();
      ctx.moveTo(size / 2, tileY + tileH * 0.08);
      ctx.lineTo(size / 2, tileY + tileH * 0.92);
      ctx.stroke();

      ctx.fillStyle = '#0A0A0F';
      const dotR = size * 0.052;
      const leftX = tileX + tileW * 0.28;
      const rightX = tileX + tileW * 0.72;
      const topY = tileY + tileH * 0.28;
      const midY = tileY + tileH * 0.5;
      const bottomY = tileY + tileH * 0.72;

      drawDominoDot(ctx, leftX, topY, dotR);
      drawDominoDot(ctx, leftX, midY, dotR);
      drawDominoDot(ctx, leftX, bottomY, dotR);
      drawDominoDot(ctx, rightX, topY, dotR);
      drawDominoDot(ctx, rightX, bottomY, dotR);

      return canvas.toDataURL('image/png');
    }

    function setupPWA() {
      const icon180 = createDominoIcon(180);
      const icon192 = createDominoIcon(192);
      const icon512 = createDominoIcon(512);

      function upsertLink(rel, href, extra) {
        let link = document.querySelector(`link[rel="${rel}"]`);
        if (!link) {
          link = document.createElement('link');
          link.rel = rel;
          document.head.appendChild(link);
        }
        link.href = href;
        if (extra) Object.assign(link, extra);
      }

      upsertLink('apple-touch-icon', icon180);
      upsertLink('icon', icon192, { type: 'image/png' });

      const page = location.pathname.split('/').pop();
      const startUrl = (!page || page === '') ? './' : './' + page;
      const manifest = {
        name: 'Dominó Tracker',
        short_name: 'Dominó',
        description: 'Apuntes de dominó offline',
        start_url: startUrl,
        scope: './',
        display: 'standalone',
        background_color: '#0A0A0F',
        theme_color: '#0A0A0F',
        orientation: 'portrait',
        icons: [
          { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any' },
          { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
        ]
      };

      upsertLink('manifest', URL.createObjectURL(
        new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' })
      ));
    }

    function isInAppBrowser() {
      const ua = navigator.userAgent || '';
      if (/WhatsApp|Instagram|FBAN|FBAV|Twitter|Line\//i.test(ua)) return true;
      if (/iPhone|iPad|iPod/.test(ua) && /AppleWebKit/.test(ua) && !/Safari|CriOS|FxiOS|EdgiOS|OPiOS/.test(ua)) return true;
      return false;
    }

    function showEnvBanner(html) {
      const banner = document.getElementById('env-banner');
      if (!banner) return;
      banner.innerHTML = html;
      banner.classList.add('show');
      document.body.classList.add('has-env-banner');
    }

    function checkEnvironment() {
      if (location.protocol === 'file:') {
        showEnvBanner(
          '<strong>⚠️ No se puede usar como archivo suelto</strong>' +
          'En iPhone/WhatsApp debes abrir un <em>enlace web https</em>, no el archivo .html adjunto. ' +
          'Publica la app en internet (GitHub Pages, Netlify, etc.) y comparte ese link.'
        );
        return;
      }

      const ogUrl = document.querySelector('meta[property="og:url"]');
      if (!ogUrl) {
        const meta = document.createElement('meta');
        meta.setAttribute('property', 'og:url');
        meta.content = location.href.split('#')[0];
        document.head.appendChild(meta);
      } else {
        ogUrl.content = location.href.split('#')[0];
      }

      if (isInAppBrowser()) {
        showEnvBanner(
          '<strong>Abrir en Safari</strong>' +
          'WhatsApp usa un navegador limitado. Toca ⋯ (arriba a la derecha) → <em>Abrir en Safari</em> o <em>Abrir en navegador externo</em>.'
        );
      }
    }

    function saveSettings() {
      state.settings = normalizeSettings(state.settings);
      saveState();
    }

    function draftFromSettings() {
      const s = state.settings;
      return {
        playerCount: s.playerCount,
        target: s.defaultTarget,
        quickValues: [...s.quickValues],
        players: s.players.map((p, i) => ({
          id: uid(),
          name: p.name,
          emoji: p.emoji || EMOJIS[i % EMOJIS.length]
        }))
      };
    }

    function applyPlayerCount(target, count, isSettings) {
      target.playerCount = count;
      const existing = target.players.slice(0, count).map((p, i) => {
        const player = {
          name: p.name || `Jugador ${i + 1}`,
          emoji: p.emoji || EMOJIS[i % EMOJIS.length]
        };
        if (!isSettings) player.id = p.id || uid();
        return player;
      });
      while (existing.length < count) {
        const i = existing.length;
        const player = { name: `Jugador ${i + 1}`, emoji: EMOJIS[i % EMOJIS.length] };
        if (!isSettings) player.id = uid();
        existing.push(player);
      }
      target.players = existing;
      if (isSettings) saveSettings();
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('es', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function getLeader(players) {
      if (!players.length) return null;
      return players.reduce((a, b) => (b.score > a.score ? b : a), players[0]);
    }

    function initSetupDraft() {
      setupDraft = draftFromSettings();
    }

    function startGame(fromDraft) {
      const game = {
        id: uid(),
        name: fromDraft.players.map(p => p.name).join(' vs '),
        target: fromDraft.target,
        quickValues: [...fromDraft.quickValues],
        round: 1,
        players: fromDraft.players.map(p => ({ ...p, score: 0 })),
        history: [],
        startedAt: new Date().toISOString(),
        finished: false
      };
      state.activeGame = game;
      selectedPlayerId = game.players[0].id;
      saveState();
      render();
    }

    function addPoints(playerId, points) {
      const game = state.activeGame;
      if (!game || game.finished || !points || points <= 0) return;

      const player = game.players.find(p => p.id === playerId);
      if (!player) return;

      const prevScore = player.score;
      player.score += points;

      const entry = {
        id: uid(),
        round: game.round,
        playerId,
        playerName: player.name,
        playerEmoji: player.emoji,
        points,
        prevScore,
        timestamp: new Date().toISOString()
      };

      game.history.unshift(entry);
      game.round++;

      saveState();
      const won = checkVictory();
      pendingFx = won
        ? { type: 'win', playerId: game.winnerId }
        : { type: 'add', playerId, entryId: entry.id, points };
      if (!won) Sound.addPoints();
      render();
    }

    function deleteEntry(entryId) {
      const game = state.activeGame;
      if (!game) return;

      const entry = findHistoryEntry(game, entryId);
      if (!entry) return;

      const player = game.players.find(p => p.id === entry.playerId);
      if (player) player.score -= entry.points;

      game.history = game.history.filter(h => h.id !== entry.id);
      unfinishGameIfNeeded(game);
      pendingFx = { type: 'remove', playerId: entry.playerId, points: entry.points };
      Sound.removePoints();
      saveState();
      render();
    }

    function checkVictory() {
      const game = state.activeGame;
      if (!game) return false;

      const winner = game.players.find(p => p.score >= game.target);
      if (winner && !game.finished) {
        game.finished = true;
        game.winnerId = winner.id;
        game.finishedAt = new Date().toISOString();

        const completed = {
          id: game.id,
          date: game.finishedAt,
          target: game.target,
          players: game.players.map(p => ({ name: p.name, emoji: p.emoji, score: p.score })),
          winner: { name: winner.name, emoji: winner.emoji, score: winner.score },
          rounds: game.history.length
        };

        state.completedGames.unshift(completed);

        const key = winner.name;
        if (!state.playerStats[key]) state.playerStats[key] = { wins: 0, emoji: winner.emoji };
        state.playerStats[key].wins++;
        state.playerStats[key].emoji = winner.emoji;

        saveState();
        showVictoryModal(winner);
        return true;
      }
      return false;
    }

    function showVictoryModal(winner, playSound) {
      if (playSound !== false) Sound.victory();
      triggerWinFlash();
      const modal = document.getElementById('victory-modal');
      const emojiEl = document.getElementById('modal-emoji');
      emojiEl.textContent = winner.emoji;
      emojiEl.classList.remove('fx-modal-celebrate');
      void emojiEl.offsetWidth;
      emojiEl.classList.add('fx-modal-celebrate');
      document.getElementById('modal-title').textContent = `¡${winner.name} gana!`;
      document.getElementById('modal-sub').textContent = `${winner.score} puntos — meta alcanzada`;
      spawnConfetti();
      modal.classList.add('open');
    }

    function triggerWinFlash() {
      const flash = document.getElementById('fx-flash');
      if (!flash) return;
      flash.classList.remove('fx-win-flash');
      void flash.offsetWidth;
      flash.classList.add('fx-win-flash');
      flash.addEventListener('animationend', () => flash.classList.remove('fx-win-flash'), { once: true });
    }

    function spawnFxFloat(col, text, cls) {
      const el = document.createElement('div');
      el.className = `fx-float ${cls}`;
      el.textContent = text;
      col.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), { once: true });
    }

    function applyGameFx() {
      if (!pendingFx || !state.activeGame) return;
      const fx = pendingFx;
      pendingFx = null;

      requestAnimationFrame(() => {
        const col = document.querySelector(`.score-column[data-id="${fx.playerId}"]`);
        if (!col) return;

        if (fx.type === 'add') {
          spawnFxFloat(col, `+${fx.points}`, 'fx-float-up');
          document.querySelector('[data-action="manual-add"]')?.classList.add('fx-dock-pulse');
          setTimeout(() => document.querySelector('[data-action="manual-add"]')?.classList.remove('fx-dock-pulse'), 450);
        } else if (fx.type === 'remove') {
          spawnFxFloat(col, `−${fx.points}`, 'fx-float-down');
        }
      });
    }

    function hideVictoryModal() {
      document.getElementById('victory-modal').classList.remove('open');
      document.getElementById('confetti-container').innerHTML = '';
    }

    function spawnConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';
      const colors = ['#7C3AED', '#06B6D4', '#10B981', '#F59E0B', '#EF4444', '#F8FAFC'];
      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.width = (6 + Math.random() * 6) + 'px';
        piece.style.height = (6 + Math.random() * 6) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        container.appendChild(piece);
      }
    }

    function revancha() {
      hideVictoryModal();
      state.activeGame = null;
      setupDraft = null;
      startGame(draftFromSettings());
    }

    let confirmDialogOpen = false;

    function showConfirmDialog(opts) {
      return new Promise(resolve => {
        if (confirmDialogOpen) {
          resolve(false);
          return;
        }
        const dialog = document.getElementById('confirm-dialog');
        const panel = dialog.querySelector('.modal');
        const okBtn = document.getElementById('confirm-ok');
        const cancelBtn = document.getElementById('confirm-cancel');
        document.getElementById('confirm-icon').textContent = opts.icon || '⚠️';
        document.getElementById('confirm-title').textContent = opts.title || '¿Confirmar?';
        document.getElementById('confirm-message').textContent = opts.message || '';
        okBtn.textContent = opts.confirmLabel || 'Confirmar';
        cancelBtn.textContent = opts.cancelLabel || 'Cancelar';
        okBtn.className = opts.danger
          ? 'btn btn-danger btn-block'
          : 'btn btn-primary btn-block';

        confirmDialogOpen = true;
        let backdropReady = false;

        const finish = (value) => {
          if (!confirmDialogOpen) return;
          confirmDialogOpen = false;
          dialog.classList.remove('open');
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          dialog.removeEventListener('click', onBackdrop);
          panel?.removeEventListener('click', stopPanelBubble);
          resolve(value);
        };
        const onOk = (e) => {
          e.preventDefault();
          e.stopPropagation();
          finish(true);
        };
        const onCancel = (e) => {
          e.preventDefault();
          e.stopPropagation();
          finish(false);
        };
        const onBackdrop = (e) => {
          if (!backdropReady) return;
          if (e.target === dialog) finish(false);
        };
        const stopPanelBubble = (e) => e.stopPropagation();

        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        panel?.addEventListener('click', stopPanelBubble);
        dialog.classList.add('open');
        setTimeout(() => {
          backdropReady = true;
          dialog.addEventListener('click', onBackdrop);
        }, 320);
      });
    }

    function openNavDialog() {
      navDialogOpen = true;
      document.querySelectorAll('.nav-sheet-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === currentTab);
      });
      document.getElementById('nav-dialog').classList.add('open');
    }

    function closeNavDialog() {
      navDialogOpen = false;
      document.getElementById('nav-dialog').classList.remove('open');
    }

    function reiniciarPartida() {
      const game = state.activeGame;
      if (!game) return;
      showConfirmDialog({
        icon: '🔄',
        title: 'Reiniciar puntajes',
        message: 'Se borran todos los apuntes de esta partida. Los jugadores y la meta se mantienen.',
        confirmLabel: 'Reiniciar'
      }).then(ok => {
        if (!ok) return;
        hideVictoryModal();
        game.players.forEach(p => { p.score = 0; });
        game.history = [];
        game.round = 1;
        game.finished = false;
        delete game.winnerId;
        delete game.finishedAt;
        saveState();
        render();
      });
    }

    function promptRevancha() {
      showConfirmDialog({
        icon: '🔁',
        title: 'Revancha',
        message: 'Nueva partida con los mismos jugadores de tu configuración guardada.',
        confirmLabel: 'Jugar revancha'
      }).then(ok => {
        if (ok) revancha();
      });
    }

    function nuevaPartida() {
      hideVictoryModal();
      state.activeGame = null;
      initSetupDraft();
      currentTab = 'game';
      saveState();
      render();
    }

    function abandonGame() {
      showConfirmDialog({
        icon: '🚪',
        title: 'Abandonar partida',
        message: 'Saldrás de la partida actual sin guardarla en el historial.',
        confirmLabel: 'Abandonar',
        danger: true
      }).then(ok => {
        if (!ok) return;
        state.activeGame = null;
        initSetupDraft();
        saveState();
        render();
      });
    }

    function deleteCompletedGame(id) {
      if (!id) return;
      showConfirmDialog({
        icon: '🗑️',
        title: 'Eliminar partida',
        message: 'Se quitará esta partida del historial.',
        confirmLabel: 'Eliminar',
        danger: true
      }).then(ok => {
        if (!ok) return;
        const before = state.completedGames.length;
        state.completedGames = state.completedGames.filter(g => String(g.id) !== String(id));
        if (state.completedGames.length === before) return;
        if (saveState()) {
          showToast('Partida eliminada');
          render();
        }
      });
    }

    function clearAllData() {
      showConfirmDialog({
        icon: '⚠️',
        title: 'Borrar todos los datos',
        message: 'Se eliminarán partidas, estadísticas y configuración. Esta acción no se puede deshacer.',
        confirmLabel: 'Borrar todo',
        danger: true
      }).then(ok => {
        if (!ok) return;
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (_) { /* ignore */ }
        state = defaultState();
        setupDraft = null;
        configDraft = null;
        selectedPlayerId = null;
        initSetupDraft();
        initConfigDraft();
        if (saveState()) {
          showToast('Datos borrados');
          currentTab = 'game';
          render();
        }
      });
    }

    /* ─── RENDER ─── */

    function render() {
      renderNav();
      renderGameView();
      renderHistoryView();
      renderConfigView();
    }

    function renderNav() {
      document.querySelectorAll('.nav-sheet-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === currentTab);
      });
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + currentTab).classList.add('active');
      if (navDialogOpen) {
        document.getElementById('nav-dialog')?.classList.add('open');
      }
      updateTopbarTitle();
    }

    function updateTopbarTitle() {
      const titleEl = document.getElementById('topbar-game-title');
      if (!titleEl) return;
      const game = state.activeGame;
      const show = game && !setupDraft && currentTab === 'game';
      if (show) {
        titleEl.textContent = game.name;
        titleEl.hidden = false;
      } else {
        titleEl.textContent = '';
        titleEl.hidden = true;
      }
    }

    function renderQuickAddRow(prefix, values, addAction) {
      if (values.length >= MAX_QUICK) {
        return `<p style="font-size:0.8125rem;color:var(--text-muted);margin-top:8px;">Máximo ${MAX_QUICK} apuntes</p>`;
      }
      const inputId = prefix === 'cfg' ? 'cfg-new-quick' : 'new-quick-value';
      return `
        <div style="display:flex;gap:8px;margin-top:8px;">
          <input type="number" class="form-input" id="${inputId}" placeholder="Valor" min="1" max="999">
          <button type="button" class="btn btn-sm" data-action="${addAction}">+ Agregar</button>
        </div>`;
    }

    function renderGameView() {
      const el = document.getElementById('view-game');
      el.classList.toggle('has-input-dock', !!(state.activeGame && !setupDraft));
      if (state.activeGame && !setupDraft) {
        el.innerHTML = renderActiveGame();
        bindGameEvents();
        applyGameFx();
      } else {
        if (!setupDraft) initSetupDraft();
        el.innerHTML = renderSetup();
        bindSetupEvents();
      }
    }

    function renderSetup() {
      const d = setupDraft;
      const playerFields = d.players.map((p, i) => `
        <div class="player-setup" data-index="${i}">
          <button type="button" class="emoji-toggle" data-action="toggle-emoji" data-index="${i}">${p.emoji}</button>
          <input type="text" class="form-input" data-action="name" data-index="${i}" value="${escapeHtml(p.name)}" placeholder="Nombre">
        </div>
        <div class="emoji-picker" id="emoji-picker-${i}" style="display:none;margin-bottom:12px;">
          ${EMOJIS.map(e => `<button type="button" class="emoji-btn ${e === p.emoji ? 'selected' : ''}" data-action="pick-emoji" data-index="${i}" data-emoji="${e}">${e}</button>`).join('')}
        </div>
      `).join('');

      return `
        <div class="page-header">
          <div class="page-badge">Nueva partida</div>
          <h1>Preparar mesa</h1>
          <div class="header-meta">Basada en tu configuración guardada</div>
        </div>

        <div class="card">
          <div class="card-title">Jugadores / Equipos</div>
          <div class="btn-group" style="margin-bottom:16px;">
            ${[2, 3, 4].map(n => `<button type="button" class="btn btn-sm ${d.playerCount === n ? 'active' : ''}" data-action="count" data-count="${n}">${n}</button>`).join('')}
          </div>
          ${playerFields}
        </div>

        <div class="card">
          <div class="card-title">Meta de puntos</div>
          <input type="number" class="form-input" id="setup-target" value="${d.target}" min="1" max="9999" style="margin-bottom:12px;">
          <div class="btn-group">
            ${TARGET_PRESETS.map(t => `<button type="button" class="btn btn-sm ${d.target === t ? 'active' : ''}" data-action="target-preset" data-target="${t}">${t}</button>`).join('')}
          </div>
        </div>

        <div class="card">
          <div class="card-title">Apuntes rápidos (máx. ${MAX_QUICK})</div>
          ${d.quickValues.map((v, i) => `
            <div class="quick-value-row">
              <span>+${v}</span>
              <button type="button" class="btn-icon" data-action="remove-quick" data-index="${i}">×</button>
            </div>
          `).join('')}
          ${renderQuickAddRow('setup', d.quickValues, 'add-quick')}
        </div>

        <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
          <button type="button" class="btn btn-primary btn-block" data-action="start-game">Comenzar partida</button>
          <button type="button" class="btn btn-block" data-action="restore-settings">↺ Restaurar configuración guardada</button>
        </div>
      `;
    }

    function renderActiveGame() {
      const game = state.activeGame;
      const leader = getLeader(game.players);
      const cols = `cols-${game.players.length}`;
      const fx = pendingFx;

      if (!selectedPlayerId) selectedPlayerId = game.players[0].id;
      const selectedPlayer = game.players.find(p => p.id === selectedPlayerId) || game.players[0];

      const columns = game.players.map(p => {
        const pct = Math.min(100, (p.score / game.target) * 100);
        const isLeader = p.id === leader.id && p.score > 0;
        const isSelected = p.id === selectedPlayerId;
        const isFxTarget = fx && fx.playerId === p.id;
        let colFx = '';
        let totalFx = '';
        if (isFxTarget) {
          if (fx.type === 'add') { colFx = ' fx-add'; totalFx = ' fx-pop'; }
          else if (fx.type === 'remove') { colFx = ' fx-remove'; totalFx = ' fx-shrink'; }
          else if (fx.type === 'win') { colFx = ' fx-win'; totalFx = ' fx-win-pulse'; }
        }
        const barFx = isFxTarget && fx.type === 'add' ? ' fx-grow' : '';
        const lines = getPlayerLines(game, p.id).map(h => {
          const lineFx = isFxTarget && fx.type === 'add' && fx.entryId === h.id ? ' fx-new' : '';
          return `<div class="score-line${lineFx}">
            <span class="score-line-value">+${h.points}</span>
            <button type="button" class="score-line-delete" data-action="delete-line" data-id="${h.id}" aria-label="Eliminar">×</button>
          </div>`;
        }).join('');

        return `
          <div class="score-column${colFx} ${isSelected ? 'selected' : ''} ${isLeader ? 'leading' : ''}" data-action="select-column" data-id="${p.id}">
            <div class="score-col-header">
              <span class="score-col-emoji">${p.emoji}</span>
              <span class="score-col-name">${escapeHtml(p.name)}</span>
            </div>
            <div class="score-col-total${totalFx}">${p.score}</div>
            <div class="progress-bar">
              <div class="progress-fill${barFx}" style="width:${pct}%"></div>
            </div>
            <div class="score-lines">${lines}</div>
          </div>
        `;
      }).join('');

      const quickBtns = game.quickValues.map(v =>
        `<button type="button" class="dock-quick-btn" data-action="quick-add" data-points="${v}">+${v}</button>`
      ).join('');

      return `
        <div class="page-header header-wrap">
          <div class="header-badge-row">
            <div class="page-badge">Ronda ${game.round} · Meta ${game.target}</div>
            <div class="header-actions" role="toolbar" aria-label="Acciones de partida">
              <button type="button" class="header-action-btn" data-action="reiniciar" title="Reiniciar puntajes" aria-label="Reiniciar puntajes">🔄</button>
              <button type="button" class="header-action-btn" data-action="revancha-menu" title="Revancha" aria-label="Revancha">🔁</button>
              <button type="button" class="header-action-btn header-action-danger" data-action="abandon" title="Abandonar" aria-label="Abandonar partida">🚪</button>
            </div>
          </div>
        </div>

        <div class="players-grid ${cols}">
          ${columns}
        </div>

        <div class="input-dock">
          <div class="dock-selected">Sumando a: <strong><span class="player-emoji">${selectedPlayer.emoji}</span> ${escapeHtml(selectedPlayer.name)}</strong></div>
          <div class="dock-quick-btns">${quickBtns}</div>
          <div class="dock-manual-row">
            <input type="number" id="manual-points" placeholder="Ingresar monto" min="1" max="999" inputmode="numeric">
            <button type="button" class="btn btn-primary btn-sum" data-action="manual-add">Sumar</button>
          </div>
        </div>
      `;
    }

    function renderHistoryView() {
      const el = document.getElementById('view-history');
      const stats = Object.entries(state.playerStats).sort((a, b) => b[1].wins - a[1].wins);

      const statsHtml = stats.length ? `
        <div class="section-title">Estadísticas</div>
        <div class="stats-grid">
          ${stats.map(([name, s]) => `
            <div class="stat-card">
              <div class="stat-emoji">${s.emoji || '🏆'}</div>
              <div class="stat-name">${escapeHtml(name)}</div>
              <div class="stat-wins">${s.wins} ${s.wins === 1 ? 'victoria' : 'victorias'}</div>
            </div>
          `).join('')}
        </div>
        <div class="divider"></div>
      ` : '';

      const gamesHtml = state.completedGames.length ? state.completedGames.map(g => `
        <div class="game-item">
          <button type="button" class="game-item-delete" data-action="delete-game" data-id="${g.id}">×</button>
          <div class="game-item-date">${formatDate(g.date)}</div>
          <div class="game-item-winner"><span class="player-emoji">${g.winner.emoji}</span> ${escapeHtml(g.winner.name)} — ${g.winner.score} pts</div>
          <div class="game-item-scores">
            ${g.players.map(p => `<span class="player-emoji">${p.emoji}</span> ${escapeHtml(p.name)}: ${p.score}`).join(' · ')}
          </div>
        </div>
      `).join('') : `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>No hay partidas completadas</p>
        </div>
      `;

      el.innerHTML = `
        <div class="page-header">
          <div class="page-badge">Archivo</div>
          <h1>Historial</h1>
        </div>
        ${statsHtml}
        <div class="section-title">Partidas (${state.completedGames.length})</div>
        ${gamesHtml}
      `;
    }

    function renderConfigView() {
      const el = document.getElementById('view-config');
      if (!configDraft) initConfigDraft();
      const s = configDraft;

      const playerFields = s.players.map((p, i) => `
        <div class="player-setup" data-index="${i}">
          <button type="button" class="emoji-toggle" data-action="cfg-toggle-emoji" data-index="${i}">${p.emoji}</button>
          <input type="text" class="form-input" data-action="cfg-name" data-index="${i}" value="${escapeHtml(p.name)}" placeholder="Nombre">
        </div>
        <div class="emoji-picker" id="cfg-emoji-picker-${i}" style="display:none;margin-bottom:12px;">
          ${EMOJIS.map(e => `<button type="button" class="emoji-btn ${e === p.emoji ? 'selected' : ''}" data-action="cfg-pick-emoji" data-index="${i}" data-emoji="${e}">${e}</button>`).join('')}
        </div>
      `).join('');

      el.innerHTML = `
        <div class="page-header">
          <div class="page-badge">Ajustes</div>
          <h1>Configuración</h1>
          <div class="header-meta">Edita y pulsa Guardar para aplicar</div>
        </div>

        <div class="card">
          <div class="card-title">Jugadores / Equipos</div>
          <div class="btn-group" style="margin-bottom:16px;">
            ${[2, 3, 4].map(n => `<button type="button" class="btn btn-sm ${s.playerCount === n ? 'active' : ''}" data-action="cfg-count" data-count="${n}">${n}</button>`).join('')}
          </div>
          ${playerFields}
        </div>

        <div class="card">
          <div class="card-title">Meta de puntos</div>
          <input type="number" class="form-input" id="cfg-target" value="${s.defaultTarget}" min="1" max="9999" style="margin-bottom:12px;">
          <div class="btn-group">
            ${TARGET_PRESETS.map(t => `<button type="button" class="btn btn-sm ${s.defaultTarget === t ? 'active' : ''}" data-action="cfg-target" data-target="${t}">${t}</button>`).join('')}
          </div>
        </div>

        <div class="card">
          <div class="card-title">Apuntes rápidos (máx. ${MAX_QUICK})</div>
          ${s.quickValues.map((v, i) => `
            <div class="quick-value-row">
              <span>+${v}</span>
              <button type="button" class="btn-icon" data-action="cfg-remove-quick" data-index="${i}">×</button>
            </div>
          `).join('')}
          ${renderQuickAddRow('cfg', s.quickValues, 'cfg-add-quick')}
        </div>

        <div class="config-save-bar">
          <button type="button" class="btn btn-primary btn-block" id="cfg-save-btn" data-action="cfg-save">Guardar configuración</button>
        </div>

        <div class="card danger-zone">
          <div class="card-title" style="color:var(--danger);">Zona peligrosa</div>
          <p style="font-size:0.875rem;color:var(--text-muted);margin-bottom:12px;">Elimina todas las partidas, estadísticas y configuración.</p>
          <button type="button" class="btn btn-danger btn-block" data-action="clear-all">Borrar todos los datos</button>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ─── EVENT BINDINGS ─── */

    function bindSetupEvents() {
      const el = document.getElementById('view-game');

      el.querySelectorAll('[data-action="count"]').forEach(btn => {
        btn.addEventListener('click', () => {
          applyPlayerCount(setupDraft, parseInt(btn.dataset.count), false);
          render();
        });
      });

      el.querySelectorAll('[data-action="name"]').forEach(input => {
        input.addEventListener('input', () => {
          setupDraft.players[parseInt(input.dataset.index)].name = input.value;
        });
      });

      el.querySelectorAll('[data-action="toggle-emoji"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = btn.dataset.index;
          const picker = document.getElementById('emoji-picker-' + i);
          const visible = picker.style.display !== 'none';
          document.querySelectorAll('.emoji-picker').forEach(p => p.style.display = 'none');
          picker.style.display = visible ? 'none' : 'flex';
        });
      });

      el.querySelectorAll('[data-action="pick-emoji"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = parseInt(btn.dataset.index);
          setupDraft.players[i].emoji = btn.dataset.emoji;
          render();
        });
      });

      el.querySelector('#setup-target').addEventListener('input', e => {
        setupDraft.target = parseInt(e.target.value) || DEFAULT_TARGET;
      });

      el.querySelectorAll('[data-action="target-preset"]').forEach(btn => {
        btn.addEventListener('click', () => {
          setupDraft.target = parseInt(btn.dataset.target);
          render();
        });
      });

      el.querySelector('[data-action="add-quick"]')?.addEventListener('click', () => {
        if (setupDraft.quickValues.length >= MAX_QUICK) {
          showToast(`Máximo ${MAX_QUICK} apuntes rápidos`);
          return;
        }
        const val = parseInt(document.getElementById('new-quick-value').value);
        if (val > 0 && !setupDraft.quickValues.includes(val)) {
          setupDraft.quickValues.push(val);
          setupDraft.quickValues.sort((a, b) => a - b);
          render();
        }
      });

      el.querySelectorAll('[data-action="remove-quick"]').forEach(btn => {
        btn.addEventListener('click', () => {
          setupDraft.quickValues.splice(parseInt(btn.dataset.index), 1);
          render();
        });
      });

      el.querySelector('[data-action="restore-settings"]').addEventListener('click', () => {
        initSetupDraft();
        render();
      });

      el.querySelector('[data-action="start-game"]').addEventListener('click', () => {
        if (setupDraft.quickValues.length === 0) {
          alert('Agrega al menos un apunte rápido.');
          return;
        }
        setupDraft.target = parseInt(document.getElementById('setup-target').value) || DEFAULT_TARGET;
        const draft = { ...setupDraft, players: setupDraft.players.map(p => ({ ...p })), quickValues: [...setupDraft.quickValues] };
        setupDraft = null;
        startGame(draft);
      });
    }

    function bindGameEvents() {
      const el = document.getElementById('view-game');

      el.querySelectorAll('[data-action="select-column"]').forEach(col => {
        col.addEventListener('click', e => {
          if (e.target.closest('[data-action="delete-line"]')) return;
          const nextId = col.dataset.id;
          if (nextId !== selectedPlayerId) Sound.selectTeam();
          selectedPlayerId = nextId;
          render();
        });
      });

      el.querySelectorAll('[data-action="delete-line"]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          deleteEntry(btn.dataset.id);
        });
      });

      el.querySelectorAll('[data-action="quick-add"]').forEach(btn => {
        btn.addEventListener('click', () => {
          addPoints(selectedPlayerId, parseInt(btn.dataset.points));
        });
      });

      el.querySelector('[data-action="manual-add"]')?.addEventListener('click', () => {
        const input = document.getElementById('manual-points');
        const pts = parseInt(input?.value);
        if (pts > 0) {
          addPoints(selectedPlayerId, pts);
          input.value = '';
        }
      });

      document.getElementById('manual-points')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') el.querySelector('[data-action="manual-add"]')?.click();
      });

      el.querySelector('[data-action="reiniciar"]')?.addEventListener('click', reiniciarPartida);

      el.querySelector('[data-action="revancha-menu"]')?.addEventListener('click', () => {
        promptRevancha();
      });

      el.querySelector('[data-action="abandon"]')?.addEventListener('click', () => {
        abandonGame();
      });
    }

    function bindHistoryEvents() {
      const el = document.getElementById('view-history');
      if (!el || el.dataset.bound) return;
      el.dataset.bound = '1';
      el.addEventListener('click', e => {
        const btn = e.target.closest('[data-action="delete-game"]');
        if (!btn || !el.contains(btn)) return;
        e.preventDefault();
        e.stopPropagation();
        deleteCompletedGame(btn.dataset.id);
      });
    }

    function bindConfigEvents() {
      const el = document.getElementById('view-config');
      if (!el || el.dataset.bound) return;
      el.dataset.bound = '1';

      el.addEventListener('click', e => {
        const btn = e.target.closest('[data-action]');
        if (!btn || !el.contains(btn)) return;

        const action = btn.dataset.action;
        if (!configDraft) initConfigDraft();

        if (action === 'cfg-save') {
          e.preventDefault();
          saveConfigDraft();
          return;
        }

        if (action === 'cfg-count') {
          applyPlayerCount(configDraft, parseInt(btn.dataset.count, 10), false);
          renderConfigView();
          return;
        }

        if (action === 'cfg-toggle-emoji') {
          const i = btn.dataset.index;
          const picker = document.getElementById('cfg-emoji-picker-' + i);
          const visible = picker && picker.style.display !== 'none';
          el.querySelectorAll('.emoji-picker').forEach(p => { p.style.display = 'none'; });
          if (picker) picker.style.display = visible ? 'none' : 'flex';
          return;
        }

        if (action === 'cfg-pick-emoji') {
          configDraft.players[parseInt(btn.dataset.index, 10)].emoji = btn.dataset.emoji;
          renderConfigView();
          return;
        }

        if (action === 'cfg-target') {
          configDraft.defaultTarget = parseInt(btn.dataset.target, 10);
          renderConfigView();
          return;
        }

        if (action === 'cfg-add-quick') {
          if (configDraft.quickValues.length >= MAX_QUICK) {
            showToast(`Máximo ${MAX_QUICK} apuntes rápidos`);
            return;
          }
          const val = parseInt(document.getElementById('cfg-new-quick')?.value, 10);
          if (val > 0 && !configDraft.quickValues.includes(val)) {
            configDraft.quickValues.push(val);
            configDraft.quickValues.sort((a, b) => a - b);
            renderConfigView();
          }
          return;
        }

        if (action === 'cfg-remove-quick') {
          configDraft.quickValues.splice(parseInt(btn.dataset.index, 10), 1);
          renderConfigView();
          return;
        }

        if (action === 'clear-all') {
          e.preventDefault();
          e.stopPropagation();
          clearAllData();
          return;
        }
      });

      el.addEventListener('input', e => {
        if (!configDraft) initConfigDraft();
        if (e.target.matches('[data-action="cfg-name"]')) {
          configDraft.players[parseInt(e.target.dataset.index, 10)].name = e.target.value;
        }
        if (e.target.id === 'cfg-target') {
          configDraft.defaultTarget = parseInt(e.target.value, 10) || DEFAULT_TARGET;
        }
      });
    }

    /* ─── NAV & GLOBAL ─── */

    document.getElementById('nav-menu-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (navDialogOpen) closeNavDialog();
      else openNavDialog();
    });

    document.getElementById('nav-dialog-close').addEventListener('click', closeNavDialog);

    document.getElementById('nav-sheet-actions').addEventListener('click', e => {
      const btn = e.target.closest('.nav-sheet-btn');
      if (!btn) return;
      currentTab = btn.dataset.tab;
      if (currentTab === 'config' && !configDraft) initConfigDraft();
      closeNavDialog();
      render();
    });

    document.getElementById('nav-dialog').addEventListener('click', e => {
      if (e.target.id === 'nav-dialog') closeNavDialog();
    });

    document.getElementById('btn-revancha').addEventListener('click', revancha);
    document.getElementById('btn-nueva-partida').addEventListener('click', nuevaPartida);

    /* ─── SERVICE WORKER ─── */

    const SW_CODE = `
      const CACHE_NAME = 'domino-tracker-v2';

      self.addEventListener('install', e => {
        self.skipWaiting();
      });

      self.addEventListener('activate', e => {
        e.waitUntil(
          caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
          )
        );
        self.clients.claim();
      });

      self.addEventListener('fetch', e => {
        if (e.request.method !== 'GET') return;
        const isDoc = e.request.mode === 'navigate' ||
          e.request.destination === 'document' ||
          (e.request.headers.get('accept') || '').includes('text/html');
        if (isDoc) {
          e.respondWith(
            fetch(e.request).then(res => {
              const clone = res.clone();
              caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
              return res;
            }).catch(() => caches.match(e.request))
          );
          return;
        }
        e.respondWith(
          caches.match(e.request).then(cached => {
            if (cached) return cached;
            return fetch(e.request).then(response => {
              if (response && response.status === 200) {
                const clone = response.clone();
                caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
              }
              return response;
            }).catch(() => cached);
          })
        );
      });
    `;

    if ('serviceWorker' in navigator) {
      const blob = new Blob([SW_CODE], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }

    /* ─── INIT ─── */

    setupPWA();
    checkEnvironment();
    bindSoundUnlock();

    if (state.activeGame) {
      setupDraft = null;
      selectedPlayerId = state.activeGame.players[0]?.id;
      let migrated = false;
      state.activeGame.history.forEach(h => {
        if (!h.id) {
          h.id = uid();
          migrated = true;
        }
      });
      if (migrated) saveState();
      if (state.activeGame.finished) {
        const winner = state.activeGame.players.find(p => p.id === state.activeGame.winnerId);
        if (winner) setTimeout(() => showVictoryModal(winner, false), 300);
      }
    } else {
      initSetupDraft();
    }

    bindHistoryEvents();
    bindConfigEvents();
    render();
  </script>
</body>
</html>
